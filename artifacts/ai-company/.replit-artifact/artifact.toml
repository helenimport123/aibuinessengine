kind = "web"
previewPath = "/"
title = "AI Company-in-a-Box"
version = "1.0.0"
id = "artifacts/ai-company"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19776

[services.development]
run = "pnpm --filter @workspace/ai-company run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-company", "run", "build" ]
publicDir = "artifacts/ai-company/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19776"
BASE_PATH = "/"
